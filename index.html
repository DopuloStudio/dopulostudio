<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOPULO STUDIO</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: Arial, sans-serif;
        }

        /* PRELOADER */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        #preloader img {
            width: 45%;
            max-width: 300px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* FIXED LOGO */
        #fixed-logo {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 25%;
            max-width: 180px;
            z-index: 1000;
        }

        /* MAIN CONTENT */
        .content {
            margin-top: 200px;
            padding: 20px;
            text-align: center;
            font-size: 20px;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            #fixed-logo {
                width: 40%;
            }
            #preloader img {
                width: 60%;
            }
        }
    </style>
<style>
.burger {
  width: 15px;
  cursor: pointer;
  padding: 8px;
  position: fixed;
  top: 10px;
  left: 20px;
  z-index: 1000;
}

.burger div {
  width: 100%;
  height: 2px;
  background: black;
  margin: 3px 0;
  transition: 0.3s;
}

.side-menu {
  position: fixed;
  top: 0;
  left: -200px;
  width: 200px;
  height: 100%;
  background: white;
  padding-top: 60px;
  transition: 0.3s;
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding-left: 20px;
}

.side-menu a {
  text-decoration: none;
  color: black;
  font-size: 18px;
}
</style>
    <script>
        window.onload = function() {
            setTimeout(() => {
                document.getElementById("preloader").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("preloader").style.display = "none";
                }, 800);
            }, 1200);
        };
    </script>
</head>

<body>
<body>
    <div class="burger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div id="sideMenu" class="side-menu">
    <a href="#">Home</a>
    <a href="#">Studio</a>
    <a href="#">Works</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
</div>
    <!-- PRELOADER -->
    <div id="preloader">
        <img src="dopulo-logo.png" alt="DOPULO STUDIO">
    </div>

    <!-- FIXED LOGO -->
    <img id="fixed-logo" src="dopulo-logo.png" alt="DOPULO STUDIO">

    <!-- MAIN CONTENT -->
    <div class="content">
        <p>Welcome to DOPULO STUDIO</p>
        <p>More content coming soon...</p>
    </div>
<script>
function toggleMenu() {
  const menu = document.getElementById("sideMenu");
  menu.style.left = menu.style.left === "0px" ? "-200px" : "0px";
}
</script>
</body>
</html>
